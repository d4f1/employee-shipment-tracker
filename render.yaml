services:
  - type: web
    name: employee-shipment-tracker
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: APP_NAME
        value: Employee Shipment Tracker
      - key: DATABASE_URL
        value: sqlite:///./employee_shipments.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: 60
      - key: JWT_COOKIE_SECURE
        value: true
      - key: RAJAONGKIR_MOCK
        value: true
      - key: RAJAONGKIR_API_KEY
        sync: false
      - key: RAJAONGKIR_BASE_URL
        value: https://rajaongkir.komerce.id/api/v1
