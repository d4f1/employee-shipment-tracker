<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login · {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{min-height:100vh;background:linear-gradient(135deg,#eef0ff,#f7f8fc 48%,#eef6ff);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
    .login-shell{min-height:100vh}
    .login-card{width:min(470px,92vw);border:0;border-radius:24px;box-shadow:0 28px 80px rgba(30,41,59,.14);overflow:hidden}
    .brand-mark{width:56px;height:56px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,#8179ff,#4f46e5);color:white;box-shadow:0 12px 30px rgba(79,70,229,.3)}
    .form-control{border-radius:12px;padding:.8rem .9rem;border-color:#dfe3ec}
    .form-control:focus{border-color:#918bff;box-shadow:0 0 0 .22rem rgba(79,70,229,.12)}
    .btn-primary{--bs-btn-bg:#4f46e5;--bs-btn-border-color:#4f46e5;border-radius:12px}
    .demo-box{background:#f7f8fc;border:1px solid #e9ebf2;border-radius:15px}
  </style>
</head>
<body>
<div class="container login-shell d-grid align-items-center py-5">
  <div class="card login-card mx-auto">
    <div class="card-body p-4 p-md-5">
      <div class="brand-mark mb-4"><i class="bi bi-box-seam fs-3"></i></div>
      <h2 class="fw-bold mb-2">Welcome back</h2>
      <p class="text-secondary mb-4">Sign in to {{ app_name }} using your assigned account.</p>
      {% if error %}<div class="alert alert-danger rounded-3"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>{% endif %}
      <form method="post" action="/login" id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group"><span class="input-group-text bg-white"><i class="bi bi-person"></i></span><input class="form-control border-start-0" name="username" autocomplete="username" required autofocus></div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
            <input class="form-control border-start-0 border-end-0" id="password" type="password" name="password" autocomplete="current-password" required>
            <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-100 py-2" id="loginButton">
          <span class="button-label"><i class="bi bi-box-arrow-in-right me-2"></i>Sign in</span>
          <span class="button-loading d-none"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
        </button>
      </form>
      <div class="demo-box p-3 mt-4">
        <div class="small fw-semibold mb-2"><i class="bi bi-key me-1"></i>Demo accounts</div>
        <div class="row g-2 small text-secondary">
          <div class="col-6"><strong class="text-dark">admin</strong><br>Admin123!</div>
          <div class="col-6"><strong class="text-dark">operator</strong><br>Operator123!</div>
          <div class="col-6"><strong class="text-dark">andriana</strong><br>Employee123!</div>
          <div class="col-6"><strong class="text-dark">siti</strong><br>Employee123!</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.getElementById('togglePassword').addEventListener('click', function () {
    const password = document.getElementById('password');
    const show = password.type === 'password';
    password.type = show ? 'text' : 'password';
    this.innerHTML = `<i class="bi bi-eye${show ? '-slash' : ''}"></i>`;
  });
  document.getElementById('loginForm').addEventListener('submit', function () {
    const button = document.getElementById('loginButton');
    button.disabled = true;
    button.querySelector('.button-label').classList.add('d-none');
    button.querySelector('.button-loading').classList.remove('d-none');
  });
</script>
</body>
</html>
